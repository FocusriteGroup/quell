name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (default features)
        run: cargo build --verbose

      - name: Build (recording feature)
        run: cargo build --features recording --verbose

      - name: Run tests (default features)
        run: cargo test --verbose

      - name: Run tests (recording feature)
        run: cargo test --features recording --verbose

      - name: Run integration tests
        run: cargo test --test integration --verbose
        continue-on-error: true

      - name: Clippy (default features)
        run: cargo clippy -- -D warnings -A dead-code -A unused-imports

      - name: Clippy (recording feature)
        run: cargo clippy --features recording -- -D warnings -A dead-code -A unused-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Audit dependencies
        run: cargo audit

      - name: Deny check
        run: cargo deny check
