name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: quell.exe
            artifact: quell-windows-x86_64.exe
            checksum_artifact: quell-windows-x86_64.exe.sha256
            shell: pwsh
            checksum_cmd: |
              $hash = (Get-FileHash target/release/quell.exe -Algorithm SHA256).Hash
              "$hash  quell-windows-x86_64.exe" | Out-File -Encoding ascii -FilePath quell-windows-x86_64.exe.sha256
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: quell
            artifact: quell-macos-aarch64
            checksum_artifact: quell-macos-aarch64.sha256
            shell: bash
            checksum_cmd: |
              shasum -a 256 quell-macos-aarch64 > quell-macos-aarch64.sha256

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }} --verbose

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Generate SHA256 checksum
        shell: ${{ matrix.shell }}
        run: ${{ matrix.checksum_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.checksum_artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            quell-windows-x86_64.exe
            quell-windows-x86_64.exe.sha256
            quell-macos-aarch64
            quell-macos-aarch64.sha256
          generate_release_notes: true
