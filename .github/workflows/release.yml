name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: quell.exe
            artifact: quell-windows-x86_64.exe
            shell: pwsh
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: quell
            artifact: quell-macos-aarch64
            shell: bash

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }} --verbose

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash quell-windows-x86_64.exe -Algorithm SHA256).Hash
          "$hash  quell-windows-x86_64.exe" | Out-File -Encoding ascii -FilePath quell-windows-x86_64.exe.sha256

      - name: Generate checksums and tarball (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          shasum -a 256 quell-macos-aarch64 > quell-macos-aarch64.sha256
          tar czf quell-macos-aarch64.tar.gz quell-macos-aarch64
          shasum -a 256 quell-macos-aarch64.tar.gz > quell-macos-aarch64.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            quell-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            quell-windows-x86_64.exe
            quell-windows-x86_64.exe.sha256
            quell-macos-aarch64
            quell-macos-aarch64.sha256
            quell-macos-aarch64.tar.gz
            quell-macos-aarch64.tar.gz.sha256
          generate_release_notes: true
